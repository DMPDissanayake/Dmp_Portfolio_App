name: dmpportfolioapp
description: "A new Flutter project (dmpportfolioapp)."
publish_to: 'none' 
version: 0.0.1+1

environment:
  sdk: ^3.10.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0


dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  screen_go: ^1.1.8
  flutter_screenutil: ^5.9.3
  go_router: ^17.3.0
  flutter_svg: ^2.3.0
  flutter_bloc: ^8.1.6
  responsive_framework: ^1.5.1
  lottie: ^3.3.3
  fl_chart: ^0.68.0
  visibility_detector: ^0.4.0+2



flutter:
  generate: false
  uses-material-design: true
  assets:
    - images/svg/
    - images/png/
    - images/animation/

  fonts:
    - family: AvenirArabic
      fonts:
        - asset: fonts/Linotype - Avenir Arabic Regular.otf
          weight: 400
        - asset: fonts/Linotype - Avenir Arabic Light.otf
          weight: 300
        - asset: fonts/Linotype - Avenir Arabic Heavy.otf
          weight: 700
